version: "3.9"

services:
  # ── Instagram Service ──────────────────────────────────────────────────────
  instagram_service:
    build: .
    container_name: instagram_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - media_data:/tmp/ig_media

  # ── Redis (optional caching) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: instagram_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  media_data:
